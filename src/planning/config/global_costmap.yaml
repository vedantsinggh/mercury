global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: map
      robot_base_frame: base_link

      update_frequency: 3.0
      publish_frequency: 2.0
      resolution: 0.05

      rolling_window: true
      width: 70
      height: 70

      track_unknown_space: true

      footprint: "[[0.25, 0.24], [0.25, -0.24], [-0.25, -0.24], [-0.25, 0.24]]"
      footprint_padding: 0.05

      # ─────────────────────────────────────────────────────────────────────
      # STEP 1 (current): Run WITHOUT lane_layer to verify Nav2 works fine.
      #         plugins: ["obstacle_layer", "inflation_layer"]
      #
      # STEP 2 (after STEP 1 works): Re-enable lane_layer:
      #         plugins: ["lane_layer", "obstacle_layer", "inflation_layer"]
      #         and uncomment the lane_layer block below.
      # ─────────────────────────────────────────────────────────────────────
      plugins: ["lane_layer", "obstacle_layer", "inflation_layer"]

      # ── Lane boundary layer (DISABLED — uncomment for STEP 2) ────────────
      lane_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /perception/road_costmap
        subscribe_to_updates: true
        enabled: true
        map_subscribe_transient_local: true
        unknown_cost_value: -1
        lethal_cost_threshold: 100

      # ── LiDAR obstacle layer ─────────────────────────────────────────────
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          clearing: True
          marking: True
          raytrace_min_range: 0.0
          raytrace_max_range: 10.0
          obstacle_min_range: 0.15
          obstacle_max_range: 8.0
          observation_persistence: 2.0
          inf_is_valid: True

      # ── Inflation layer ───────────────────────────────────────────────────
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.35
        cost_scaling_factor: 2.5